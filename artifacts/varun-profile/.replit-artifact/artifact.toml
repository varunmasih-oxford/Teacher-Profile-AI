kind = "web"
previewPath = "/"
title = "Varun — Teacher Profile"
version = "1.0.0"
id = "artifacts/varun-profile"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19143

[services.development]
run = "pnpm --filter @workspace/varun-profile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/varun-profile", "run", "build" ]
publicDir = "artifacts/varun-profile/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19143"
BASE_PATH = "/"
